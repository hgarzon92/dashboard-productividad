<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Productividad</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#f6f8fb;padding:20px}
.nav{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.nav-btn{padding:8px 14px;border-radius:20px;border:1px solid #ddd;cursor:pointer}
.nav-btn.active{background:#1D9E75;color:#fff}
.view{display:none}
.view.active{display:block}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px}
.member-row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;cursor:pointer;align-items:center;gap:10px}
.badge{padding:3px 8px;border-radius:10px;font-size:11px}
.ok{background:#e6f7f1}.warn{background:#fff3cd}.bad{background:#fdecec}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;padding:20px;border-radius:12px;width:400px;max-height:80vh;overflow:auto}
#toast{position:fixed;bottom:20px;right:20px;background:#1D9E75;color:#fff;padding:12px 18px;border-radius:8px;display:none}
.btn-mini{padding:4px 8px;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:11px;background:#fff}
.btn-export{
  padding:9px 18px;background:#185FA5;color:#fff;border:none;
  border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px
}
.btn-export:hover{background:#1250a0}
.export-bar{
  display:flex;align-items:center;gap:10px;
  background:#fff;padding:12px 16px;border-radius:10px;
  margin-bottom:12px;flex-wrap:wrap;border:1px solid #e0e0e0
}
.export-bar label{font-size:13px;color:#555;font-weight:600}
.export-bar select, .export-bar input{
  padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px
}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px">
    <div class="nav" id="nav"></div>
  </div>

  <!-- COORDINADOR -->
  <div id="v-coordinador" class="view active">

    <!-- BARRA DE EXPORTACIÓN -->
    <div class="export-bar">
      <label>📥 Exportar a Excel:</label>
      <select id="filtro-persona">
        <option value="">Todas las personas</option>
      </select>
      <select id="filtro-estado">
        <option value="">Todos los estados</option>
        <option>Completado</option>
        <option>Revisión</option>
        <option>Rechazado</option>
        <option>Otros</option>
      </select>
      <label style="margin-left:4px">Desde:</label>
      <input type="date" id="filtro-desde">
      <label>Hasta:</label>
      <input type="date" id="filtro-hasta">
      <button class="btn-export" onclick="exportarCSV()">
        ⬇ Descargar Excel (.csv)
      </button>
    </div>

    <div class="card">
      <h3>📊 Operaciones por hora</h3>
      <canvas id="grafico"></canvas>
    </div>
    <div class="card">
      <h3>👥 Equipo operativo</h3>
      <div id="lista"></div>
    </div>
    <div class="card">
      <h3>🧾 Pagos registrados</h3>
      <div id="descripcion-pagos"></div>
    </div>
  </div>

  <!-- REGISTRO -->
  <div id="v-registro" class="view">
    <div class="card">
      <h3>Registrar actividad</h3>
      <select id="persona"></select><br><br>
      <select id="estado">
        <option>Completado</option>
        <option>Revisión</option>
        <option>Rechazado</option>
        <option>Otros</option>
      </select><br><br>
      <input type="number" id="tiempo" placeholder="Tiempo (minutos)"><br><br>
      <input type="text" id="comentarios" placeholder="Comentarios"><br><br>
      <button onclick="registrar()">Guardar</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="v-admin" class="view">
    <div class="card">
      <h3>Administrar equipo</h3>
      <input id="nuevoNombre" placeholder="Nombre"><br><br>
      <select id="nuevoRol">
        <option>Coordinador</option>
        <option>Analista</option>
        <option>Auxiliar</option>
      </select><br><br>
      <button onclick="agregarUsuario()">Agregar</button>
      <hr><br>
      <div id="admin-lista"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <br>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<div id="toast"></div>

<!-- FIREBASE REALTIME DATABASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getDatabase, ref, push, remove, onValue
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRqAGcaSvItP56DT3_hEB0fVJSesntg7s",
  authDomain: "dashboard-productividad-c1c2f.firebaseapp.com",
  projectId: "dashboard-productividad-c1c2f",
  storageBucket: "dashboard-productividad-c1c2f.firebasestorage.app",
  messagingSenderId: "457846799911",
  appId: "1:457846799911:web:04706d7ee684cfa3afd802",
  databaseURL: "https://dashboard-productividad-c1c2f-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

window._guardarPago     = (d) => push(ref(db, "pagos"), d);
window._guardarUsuario  = (d) => push(ref(db, "equipo"), d);
window._eliminarUsuario = (id) => remove(ref(db, "equipo/" + id));

onValue(ref(db, "equipo"), (snap) => {
  const raw = snap.val() || {};
  window.equipo = Object.entries(raw).map(([id, v]) => ({ ...v, _id: id }));
  const sel = document.getElementById("persona");
  if (sel) {
    const prev = sel.value;
    sel.innerHTML = window.equipo.map(p => `<option>${p.nombre}</option>`).join("");
    if (prev) sel.value = prev;
  }
  actualizarFiltroPersonas();
  render();
});

onValue(ref(db, "pagos"), (snap) => {
  const raw = snap.val() || {};
  window.pagos = Object.entries(raw).map(([id, v]) => ({ ...v, _id: id }));
  render();
});
</script>

<script>
window.equipo = [];
window.pagos  = [];
let chart;

function showToast(msg, color="#1D9E75"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = color;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

function renderNav(){
  document.getElementById("nav").innerHTML = `
    <button class="nav-btn active" onclick="cambiarVista('coordinador',this)">Coordinador</button>
    <button class="nav-btn" onclick="cambiarVista('registro',this)">Registrar</button>
    <button class="nav-btn" onclick="cambiarVista('admin',this)">Administrar equipo</button>`;
}

function cambiarVista(id, btn){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function registrar(){
  const datos = {
    persona:     document.getElementById("persona").value,
    estado:      document.getElementById("estado").value,
    tiempo:      document.getElementById("tiempo").value,
    comentarios: document.getElementById("comentarios").value,
    hora:        new Date().getHours(),
    fecha:       new Date().toLocaleDateString('es-CO'),
    ts:          Date.now()
  };
  window._guardarPago(datos).then(() => {
    showToast("Registro guardado ✓");
    document.getElementById("tiempo").value = "";
    document.getElementById("comentarios").value = "";
  });
}

function agregarUsuario(){
  const nombre = document.getElementById("nuevoNombre").value.trim();
  const rol    = document.getElementById("nuevoRol").value;
  if (!nombre) return;
  window._guardarUsuario({ nombre, rol }).then(() => {
    showToast("Usuario agregado ✓");
    document.getElementById("nuevoNombre").value = "";
  });
}

function eliminar(id){
  window._eliminarUsuario(id).then(() => showToast("Usuario eliminado", "#E24B4A"));
}

function editar(i){
  const nuevo = prompt("Nuevo nombre", window.equipo[i].nombre);
  if (nuevo){ window.equipo[i].nombre = nuevo; render(); }
}

function verDetalle(nombre){
  const data = window.pagos.filter(p => p.persona === nombre);
  document.getElementById("modal-title").innerText = nombre;
  document.getElementById("modal-body").innerHTML = data.length
    ? data.map(p =>
        `<div style="padding:6px 0;border-bottom:1px solid #eee">
          <b>${p.fecha || ''} ${p.hora}:00</b> — 
          ${p.estado} (${p.tiempo || 0} min)
          ${p.comentarios ? '<br><small style="color:#888">' + p.comentarios + '</small>' : ''}
        </div>`).join("")
    : "Sin actividad registrada";
  document.getElementById("modal").style.display = "flex";
}

function verDetalleRegistro(i){
  const p = window.pagos[i];
  document.getElementById("modal-title").innerText = "Detalle registro";
  document.getElementById("modal-body").innerHTML = `
    <div><b>Persona:</b> ${p.persona}</div>
    <div><b>Fecha:</b> ${p.fecha || '—'}</div>
    <div><b>Hora:</b> ${p.hora}:00</div>
    <div><b>Estado:</b> ${p.estado}</div>
    <div><b>Tiempo:</b> ${p.tiempo || "—"} min</div>
    <div><b>Comentarios:</b> ${p.comentarios || "—"}</div>`;
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

// ── Actualizar filtro de personas en la barra de exportación ──
function actualizarFiltroPersonas(){
  const sel = document.getElementById("filtro-persona");
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '<option value="">Todas las personas</option>' +
    window.equipo.map(p => `<option>${p.nombre}</option>`).join("");
  if (prev) sel.value = prev;
}

// ── EXPORTAR A CSV ────────────────────────────────────────
function exportarCSV(){
  const persona = document.getElementById("filtro-persona").value;
  const estado  = document.getElementById("filtro-estado").value;
  const desde   = document.getElementById("filtro-desde").value;
  const hasta   = document.getElementById("filtro-hasta").value;

  // Filtrar datos
  let datos = [...window.pagos];

  if (persona) datos = datos.filter(p => p.persona === persona);
  if (estado)  datos = datos.filter(p => p.estado  === estado);
  if (desde)   datos = datos.filter(p => {
    if (!p.ts) return true;
    return new Date(p.ts) >= new Date(desde);
  });
  if (hasta)   datos = datos.filter(p => {
    if (!p.ts) return true;
    return new Date(p.ts) <= new Date(hasta + "T23:59:59");
  });

  if (!datos.length){
    showToast("No hay datos con esos filtros", "#E24B4A");
    return;
  }

  // Ordenar por fecha/hora
  datos.sort((a, b) => (a.ts || 0) - (b.ts || 0));

  // Construir CSV
  const encabezado = ["Fecha", "Hora", "Persona", "Estado", "Tiempo (min)", "Comentarios"];

  const filas = datos.map(p => {
    const fecha = p.ts
      ? new Date(p.ts).toLocaleDateString('es-CO')
      : (p.fecha || "—");
    const hora = p.ts
      ? new Date(p.ts).toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'})
      : (p.hora !== undefined ? p.hora + ":00" : "—");
    // Escapar comas y comillas en comentarios
    const comentario = (p.comentarios || "").replace(/"/g, '""');
    return [
      fecha,
      hora,
      p.persona || "—",
      p.estado  || "—",
      p.tiempo  || "0",
      `"${comentario}"`
    ];
  });

  const csvContent = [encabezado, ...filas]
    .map(fila => fila.join(";"))   // punto y coma para Excel en español
    .join("\n");

  // Agregar BOM para que Excel abra con tildes correctas
  const bom = "\uFEFF";
  const blob = new Blob([bom + csvContent], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);

  // Nombre del archivo con fecha
  const hoy = new Date().toLocaleDateString('es-CO').replace(/\//g, "-");
  const nombreArchivo = `Productividad_${persona || "Equipo"}_${hoy}.csv`;

  const link = document.createElement("a");
  link.href = url;
  link.download = nombreArchivo;
  link.click();
  URL.revokeObjectURL(url);

  showToast(`✓ Descargado: ${nombreArchivo}`);
}

// ── Render ────────────────────────────────────────────────
function render(){
  document.getElementById("lista").innerHTML =
    window.equipo.length
      ? window.equipo.map(p => {
          const total = window.pagos.filter(x => x.persona === p.nombre).length;
          return `<div class="member-row" onclick="verDetalle('${p.nombre}')">
            <span>${p.nombre} <small style="color:#999">(${p.rol})</small></span>
            <span>${total} ops</span>
          </div>`;
        }).join("")
      : "<p style='color:#999;padding:10px'>Sin colaboradores. Agrégalos en Administrar equipo.</p>";

  const sel = document.getElementById("persona");
  if (sel && !sel.options.length)
    sel.innerHTML = window.equipo.map(p => `<option>${p.nombre}</option>`).join("");

  document.getElementById("descripcion-pagos").innerHTML =
    window.pagos.length
      ? window.pagos.map((p, i) => {
          const cls = p.estado === "Completado" ? "ok"
                    : p.estado === "Revisión"   ? "warn" : "bad";
          return `<div class="member-row" onclick="verDetalleRegistro(${i})">
            <span>${p.persona} <small style="color:#aaa">${p.fecha || ''}</small></span>
            <span class="badge ${cls}">${p.estado}</span>
          </div>`;
        }).join("")
      : "<p style='color:#999;padding:10px'>Sin pagos registrados aún.</p>";

  document.getElementById("admin-lista").innerHTML =
    window.equipo.map((p, i) =>
      `<div class="member-row">
        <span>${p.nombre} (${p.rol})</span>
        <div>
          <button class="btn-mini" onclick="editar(${i})">Editar</button>
          <button class="btn-mini" onclick="eliminar('${p._id}')">Eliminar</button>
        </div>
      </div>`
    ).join("");

  renderGrafico();
}

function renderGrafico(){
  const horas = Array(24).fill(0);
  window.pagos.forEach(p => { if (p.hora !== undefined) horas[p.hora]++; });
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('grafico'), {
    type: 'bar',
    data: {
      labels: horas.map((_, i) => i + ":00"),
      datasets: [{ data: horas, backgroundColor: '#1D9E75' }]
    },
    options: { plugins: { legend: { display: false } } }
  });
}

renderNav();
render();
</script>
</body>
</html>
